services:
  postgres:
    image: postgres:16-alpine
    container_name: estateos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: estateos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estateos_dev}
      POSTGRES_DB: estateos
    volumes:
      - estateos_pg_data:/var/lib/postgresql/data
    ports:
      - "30210:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estateos"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: estateos:phase2.5.11
    container_name: estateos_web
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://estateos:${POSTGRES_PASSWORD:-estateos_dev}@postgres:5432/estateos
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://estateos.ru}
      NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-https://estateos.ru}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_HTTPS_PROXY: ${ELEVENLABS_HTTPS_PROXY}
      TTS_PROVIDER: ${TTS_PROVIDER:-openai}
      TTS_ELEVEN_VOICE: ${TTS_ELEVEN_VOICE:-alisa}
      TTS_ELEVEN_MODEL: ${TTS_ELEVEN_MODEL:-eleven_multilingual_v2}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:noreply@estateos.ru}
      CRON_SECRET: ${CRON_SECRET}
      AUDIO_STORAGE_ROOT: /var/lib/estateos/audio
      NODE_ENV: production
      HTTPS_PROXY: http://host.docker.internal:10809
      HTTP_PROXY: http://host.docker.internal:10809
      NO_PROXY: localhost,127.0.0.1,postgres,estateos_db
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "30220:3200"
    volumes:
      - estateos_audio:/var/lib/estateos/audio

volumes:
  estateos_pg_data:
    driver: local
  estateos_audio:
    driver: local
